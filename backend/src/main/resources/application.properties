spring.application.name=taskflow-backend

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DATABASE:taskflow}

# Server Configuration
server.port=${PORT:8080}

# CORS - Allow Vercel and Render
cors.allowed-origins=https://*.vercel.app,https://*.onrender.com

# Logging
logging.level.com.taskflow=INFO
logging.level.org.springframework.web=INFO